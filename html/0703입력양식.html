<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>입력양식</title>
    <style>
        /* 
        선택자를 이용해서 요소를 선택하고 중괄호 안에 스타일을 정의한다.
        선택자: 요소를 선택
                #id값, 태그
        선택자 {
            속성 : 값;
            속성 : 값;
            width : 30px;
            height : 20px;
            }
         */
        #number {
            width: 30px;
            height: 20px;
            border-color: aqua;
            border-radius: 10%;
        }
        /*
        display 속성
        div, h1 등 한 줄을 모두 쓰는 요소: 블럭 요소
        컨텐츠 하나만 맞춰있는 요소: 인라인 요소
        컨텐츠만큼 차지 하는데 페딩을 갖는 요소: 인라인 블럭
        
        인라인 요소의 경우 여백을 갖지 못하므로 width값을 넣어도 먹지 않는다.
         */
        label{
            display: inline-block;
            width: 100px;
        }

    </style>
</head>
<body>
    <h1>입력양식</h1>
    <!--
        form : 서버에 데이터를 전달 하기 위해서

        action : 요청 하려는 페이지의 주소
        method : 요청방식 (get-기본값,post)
        name : 자바스크립트로 폼을 제어하기 위해서
        target : action으로 이동하는 페이지를 어느 창에 띄울지 결정
    -->
    <form action="0703loginAction.html" method="get" 
        name="loginForm" target="_self">
        id : <input type="text" name="id" minlength="4" maxlength="12"><br>
        <small>아이디는 4자 이상 12자 이하로 작성 가능합니다.</small><br>
        pw : <input type="password" name="pw" required><br>

        <!-- 버튼의 종류-->
        <input type="button" value="로그인">
        <!--
            form태그의 action속성을 서버에 요청
            method 속성에 정의된 방식으로
            (만약 지정하지 않았다면 기본값인 get방식으로)

            데이터가 넘어가지 않는 경우
                name 속성이 있는지
                form 태그로 감싸져 있는지
            
            required : 필수입력 체크
            minlength / maxlength : 글자수제한
        -->
        <input type="submit" value="서브밋">
        <input type="reset" value="리셋">
    </form>

    <hr>
    
    <h1>입력양식의 종류</h1>
    <form action="0703loginAction.html">

        <fieldset>
            <legend>텍스트 입력 양식</legend>
            
            <!--
            label - 폼 요소에 이름을 붙일 때 사용.
            for 속성을 이용해서 요소와 연결해줌.
            for = "요소의 id값"
            레이블을 선택하면 입력요소에 커서가 들어간다.
            -->
            <label for="test">text</label>
            <input id="test" type="text" value="텍스트입력" 
                    size="20px" placeholder="아이디를 입력해주세요"><br>

                <!--
                value : 입력된 내용 - 서브밋 버튼을 눌렀을 때 서버로 전달되는 내용 
                placeholder : 입력창이 비어있을 때 힌트를 표시.(입력되면 사라짐)
                -->
            <label for="testpw">password</label>
            <input type="password" name="" id="testpw" placeholder="비밀번호를 입력해주세요"><br>
            <!-- 입력창에 x버튼을 출력 -->
            <label for="tests">search</label>
            <input type="search" name="" id="tests"><br>
            <!-- http://,https:// 문자가 있는지 체크 -->
            <label for="testurl">url</label>
            <input type="url" name="" id="testurl"><br>
            <!-- 이메일 형식 체크 -->
            <label for="teste">email</label>
            <input type="email" name="" id="teste" ><br>
            
        </fieldset>

        <hr>
        
        <fieldset>
            <legend>체크박스와 라디오버튼</legend>
            취미 <br> 
                <!--
                name으로 묶어주고
                선택된 value 속성의 값이 서버에 전달
                체크박스 - 다중선택(name으로 묶인 그룹에서 여러개의 항목을 선택)
                라디오버튼 - 단일선택(name으로 묶인 그룹에서 하나의 항목을 선택)
                -->
            <input type="checkbox" name="hobby" id="" value="1">축구
            <input type="checkbox" name="hobby" id="" value="2">농구
            <input type="checkbox" name="hobby" id="" value="3">배구
            <input type="checkbox" name="hobby" id="" value="4">야구 
            <br>
            성별<br>
            <input type="radio" name="gender" id="" value="1">남 <br>
            <input type="radio" name="gender" id="" value="2">여 <br>
            <input type="radio" name="gender" id="" value="3">비밀 <br>
            
        </fieldset>
        
        <br>     
        number <input type="number" name="" id="number" 
                max="100" min="10" step="10">
        <hr>

        <input type="submit" value="회원가입">

    </form>

    

    
</body>
</html>
