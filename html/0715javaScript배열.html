    <script>
    //배열: 여러개의 데이터를 하나의 변수에 저장
    // 선언: []를 이용해서 여러개의 값을 나열
    //배열의 길이: 배열변수명.length
    // 배열의 변수명[방번호]
    const titles = ["도시의 밤", "파랑의 계절","스텔라 오디세이"];
    for(let i=0; i<titles.length;i++){
        // i<=titles.length-1;
        console.log(titles[i]);
    }

    // 없는 방 번호를 입력하면 = undefined
    console.log(titles[4]);

    // new Array()를 사용해서 배열을 만드는 방법
    const arr1 = new Array(1,2,3);
    console.log(arr1);

    //반복문 안에 있는 데이터의 값을 출력하기 위해서 반복문을 이용

    // 배열의 방의 값을 변경하기
    titles[2] = "타짜";
    console.log(titles[2]);
    </script>

    <h2>함수</h2>
    <script>
        /*  
            매개변수: 외부에서 함수를 호출할 때 넣어주는 값(필수는 아님!)
            반환: 호출한 곳으로 값을 되돌려보냄(필수는 아님!)

            함수작성 방법
            function 함수이름 (매개변수1, 매개변수2, ...){
                return 반환할값(리턴할값);
            }

            함수실행 방법
                함수명();
                함수명(값, 값);
        */

        function print(){ //선언적 함수: 이름을 붙여서 함수를 만드는 방법
            console.log('print');
        }

        let arrow_print = () => {console.log('print')}
        arrow_print();
        function print1(msg){
            console.log(msg);
        }

        //익명의 화살표함수를 변수에 저장
        let arrow_print1 = msg => console.log(msg)

        // 두개의 수를 입력 받아서 두 수의 합을 반환하는 함수
        function add(i, j){
            return i + j;
        }

        let arrow_add = (i,j) => i + j;

        //배열메서드: 배열 자체를 변경하는 경우, 반환만 하는 경우
        // 함수의 실행 결과 반환값을 재사용하기 위해 변수에 저장 후 다시 사용
        add(1,2); // 호출만 하는 것은 의미가 없음
        let res = add(1,2); //반환값을 재사용해야한다면 변수에 저장해야한다
        console.log(res)

        /*
        함수 작성 방법 - 익명의 함수
        함수를 변수에 저장하거나
        함수를 매개변수로 전달!! -콜백함수
        */ 

        // 익명의 함수를 변수에 저장
        let greet = function(name){
            console.log(`${name}님 반가워요!`)
        }

        // 변수에 저장된 익명의 함수를 실행하는 방법
        // 변수의 이름을 불러줌()
        greet();
        greet('미네');
